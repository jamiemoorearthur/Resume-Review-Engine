name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          python -c "from spacy.cli import download; download('en_core_web_sm')"

      - name: Run tests
        run: pytest backend/tests/ -v
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run Bandit security scan
        run: |
          pip install bandit
          bandit -r backend/app -ll

      - name: Run pip-audit vulnerability scan
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - name: Build Docker image
        run: docker build -t cv-reviewer:${{ github.sha }} ./backend

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cv-reviewer:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  deploy-backend:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 129.159.222.241
          username: ubuntu
          key: ${{ secrets.ORACLE_SSH_PRIVATE_KEY }}
          script: |
            cd ~/Resume-Review-Engine && git pull
            cd backend && docker build -t cv-reviewer .
            docker stop cv-reviewer || true
            docker rm cv-reviewer || true
            docker run -d --name cv-reviewer --restart unless-stopped \
              -p 8000:8000 \
              -v /app/data/chroma:/app/data/chroma \
              --env-file ~/app.env \
              cv-reviewer

      - name: Smoke test
        run: |
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://cvreview-api.duckdns.org/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/12: got HTTP $STATUS — retrying in 5s"
            sleep 5
          done
          echo "Smoke test failed: /health did not return 200 within 60s"
          exit 1

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Vercel
        working-directory: frontend
        run: npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
